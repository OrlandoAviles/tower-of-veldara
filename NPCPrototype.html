<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Idle Eldrune Prototype v2</title>
<style>
  body {
    margin: 0;
    display: grid;
    place-items: center;
    background: #0b1020;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }

  canvas {
    image-rendering: pixelated;
    border: 2px solid #333;
  }
</style>
</head>
<body>
<canvas id="game" width="320" height="180" style="width:640px; height:360px;"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const SCALE = 4;
const TRANSPARENT = 'transparent';

let time = 0;
const DAY_LENGTH = 2000;
const DAY_PORTION = 0.6;
const WORK_CAPACITY = 5;
const TRADE_POINT_X = 160;

function isDay() {
  return (time % DAY_LENGTH) < DAY_LENGTH * DAY_PORTION;
}

const sprite = [
  [TRANSPARENT, '#22c55e', '#22c55e', TRANSPARENT],
  ['#22c55e', '#86efac', '#86efac', '#22c55e'],
  ['#22c55e', '#22c55e', '#22c55e', '#22c55e'],
  [TRANSPARENT, '#22c55e', '#22c55e', TRANSPARENT]
];

function drawSprite(x, y, flip = false) {
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[0].length; c++) {
      const col = sprite[r][c];
      if (col === TRANSPARENT) continue;
      const drawC = flip ? (sprite[0].length - 1 - c) : c;
      ctx.fillStyle = col;
      ctx.fillRect(x + drawC * SCALE, y + r * SCALE, SCALE, SCALE);
    }
  }
}

function createNPC(name, role, homeX, shedX, fieldX) {
  return {
    name,
    role,
    x: homeX,
    y: 120,
    homeX,
    shedX,
    fieldX,
    targetX: homeX,
    speed: 0.5,
    facingLeft: false,
    state: 'home',
    bubble: '',
    workProgress: 0,
    stored: 0,
    needs: { hunger: 0 }
  };
}

const farmer = createNPC('Farmer', 'farmer', 40, 80, 120);
const rancher = createNPC('Rancher', 'rancher', 240, 200, 160);
const npcs = [farmer, rancher];

function updateNeeds(npc) {
  if (npc.state === 'home') {
    npc.needs.hunger += 0.05;
  }
}

function near(a, b, threshold = 2) {
  return Math.abs(a - b) < threshold;
}

function decide(npc) {
  if (!isDay()) {
    npc.state = 'home';
    npc.targetX = npc.homeX;
    npc.bubble = 'Resting';
    return;
  }

  if (npc.needs.hunger > 50) {
    npc.state = 'trade';
    npc.targetX = TRADE_POINT_X;
    npc.bubble = 'Need supplies';
    return;
  }

  if (npc.state === 'home') {
    npc.state = 'toShed';
    npc.targetX = npc.shedX;
    npc.bubble = 'Heading out';
    return;
  }

  if (npc.state === 'toShed' && near(npc.x, npc.shedX) && npc.workProgress === 0) {
    npc.state = 'toField';
    npc.targetX = npc.fieldX;
    npc.bubble = 'To work';
    return;
  }

  if ((npc.state === 'toField' || npc.state === 'working') && near(npc.x, npc.fieldX) && npc.workProgress === 0) {
    npc.state = 'working';
    npc.bubble = 'Working';
  }

  if (npc.state === 'working') {
    npc.workProgress += 0.05;

    if (npc.workProgress >= WORK_CAPACITY) {
      npc.state = 'carrying';
      npc.targetX = npc.shedX;
      npc.bubble = 'Carrying goods';
      return;
    }
  }

  if (npc.state === 'carrying' && near(npc.x, npc.shedX)) {
    npc.state = 'unloading';
    npc.bubble = 'Unloading';
  }

  if (npc.state === 'unloading') {
    npc.stored += npc.workProgress;
    npc.workProgress = 0;
    npc.state = 'toField';
    npc.targetX = npc.fieldX;
    npc.bubble = 'Back to work';
  }
}

function move(npc) {
  const dx = npc.targetX - npc.x;
  if (Math.abs(dx) > 1) {
    npc.x += Math.sign(dx) * npc.speed;
    npc.facingLeft = dx < 0;
  }
}

function trade(a, b) {
  if (Math.abs(a.x - b.x) < 20 && a.state === 'trade' && b.state === 'trade') {
    if (a.stored > 1 && b.stored > 1) {
      a.stored--;
      b.stored--;
      a.needs.hunger = 0;
      b.needs.hunger = 0;
      a.bubble = 'Trade done';
      b.bubble = 'Nice';
    }
  }
}

function drawBubble(npc) {
  if (!npc.bubble) return;
  ctx.fillStyle = 'white';
  ctx.fillRect(npc.x - 10, npc.y - 20, 70, 12);
  ctx.fillStyle = 'black';
  ctx.font = '8px Arial';
  ctx.fillText(npc.bubble, npc.x - 8, npc.y - 11);
}

function drawProgressBar(npc) {
  if (npc.workProgress <= 0) return;

  const width = 20;
  const height = 3;
  const progress = Math.min(npc.workProgress / WORK_CAPACITY, 1);

  ctx.fillStyle = '#222';
  ctx.fillRect(npc.x, npc.y - 6, width, height);

  ctx.fillStyle = npc.state === 'carrying' ? '#60a5fa' : '#22c55e';
  ctx.fillRect(npc.x, npc.y - 6, width * progress, height);
}

function update() {
  time++;
  npcs.forEach((npc) => {
    updateNeeds(npc);
    decide(npc);
    move(npc);
  });
  trade(farmer, rancher);
  trade(rancher, farmer);
}

function draw() {
  ctx.clearRect(0, 0, 320, 180);

  ctx.fillStyle = isDay() ? '#7dd3fc' : '#0f172a';
  ctx.fillRect(0, 0, 320, 120);

  const cycle = (time % DAY_LENGTH) / DAY_LENGTH;
  const angle = cycle * Math.PI;
  const centerX = 160;
  const centerY = 120;
  const radius = 100;

  const celestialX = centerX + Math.cos(angle + Math.PI) * radius;
  const celestialY = centerY - Math.sin(angle) * radius;

  ctx.beginPath();
  ctx.fillStyle = isDay() ? '#fde047' : '#cbd5f5';
  ctx.arc(celestialX, celestialY, 6, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#166534';
  ctx.fillRect(0, 120, 320, 60);

  if (!isDay()) {
    ctx.fillStyle = 'rgba(0,0,50,0.25)';
    ctx.fillRect(0, 0, 320, 180);
  }

  ctx.fillStyle = '#92400e';
  ctx.fillRect(30, 100, 20, 20);
  ctx.fillRect(230, 100, 20, 20);

  ctx.fillStyle = '#78350f';
  ctx.fillRect(70, 110, 16, 10);
  ctx.fillRect(190, 110, 16, 10);

  ctx.fillStyle = '#14532d';
  ctx.fillRect(110, 120, 30, 20);
  ctx.fillRect(150, 120, 30, 20);

  npcs.forEach((npc) => {
    drawSprite(Math.round(npc.x), npc.y, npc.facingLeft);
    drawProgressBar(npc);
    drawBubble(npc);
  });

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, 320, 20);

  ctx.fillStyle = 'white';
  ctx.font = '8px Arial';
  ctx.fillText(`Farmer: ${farmer.stored.toFixed(0)}`, 5, 12);
  ctx.fillText(`Rancher: ${rancher.stored.toFixed(0)}`, 90, 12);
  ctx.fillText(`Time: ${isDay() ? 'Day' : 'Night'}`, 220, 12);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function runTests() {
  console.assert(isDay() === true, 'Expected the world to start during the day.');

  const testNPC = createNPC('Test', 'tester', 10, 20, 30);
  console.assert(testNPC.state === 'home', 'New NPC should start at home.');
  console.assert(testNPC.workProgress === 0, 'New NPC should start with zero work progress.');

  const nearTradeA = createNPC('A', 'farmer', 0, 0, 0);
  const nearTradeB = createNPC('B', 'rancher', 0, 0, 0);
  nearTradeA.x = 100;
  nearTradeB.x = 110;
  nearTradeA.state = 'trade';
  nearTradeB.state = 'trade';
  nearTradeA.stored = 2;
  nearTradeB.stored = 2;
  nearTradeA.needs.hunger = 60;
  nearTradeB.needs.hunger = 60;
  trade(nearTradeA, nearTradeB);
  console.assert(nearTradeA.stored === 1 && nearTradeB.stored === 1, 'Trade should reduce both stored counts by 1.');
  console.assert(nearTradeA.needs.hunger === 0 && nearTradeB.needs.hunger === 0, 'Trade should reset hunger for both NPCs.');

  const farTradeA = createNPC('C', 'farmer', 0, 0, 0);
  const farTradeB = createNPC('D', 'rancher', 0, 0, 0);
  farTradeA.x = 10;
  farTradeB.x = 100;
  farTradeA.state = 'trade';
  farTradeB.state = 'trade';
  farTradeA.stored = 2;
  farTradeB.stored = 2;
  trade(farTradeA, farTradeB);
  console.assert(farTradeA.stored === 2 && farTradeB.stored === 2, 'Trade should not happen when NPCs are too far apart.');
}

runTests();
loop();
</script>
</body>
</html>
